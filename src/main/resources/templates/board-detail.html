<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title} + ' - Duo'">게시글 - Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            color: #18181b;
        }

        header {
            background: #18181b;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: #f97316; }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
        }

        .header-nav span { color: #a1a1aa; }

        .header-nav a {
            color: #d4d4d8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }

        .header-nav a:hover { color: #fff; }

        .nav-divider {
            width: 1px;
            height: 14px;
            background: #3f3f46;
        }

        .container {
            max-width: 800px;
            margin: 36px auto;
            padding: 0 20px;
        }

        /* 글 카드 */
        .post-card {
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 10px;
            overflow: hidden;
        }

        .post-header {
            padding: 28px 32px 22px;
            border-bottom: 1px solid #f4f4f5;
        }

        .post-badge {
            display: inline-block;
            padding: 2px 10px;
            background: #fff7ed;
            color: #c2410c;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #fed7aa;
            margin-bottom: 14px;
        }

        .post-title {
            font-size: 22px;
            font-weight: 700;
            color: #18181b;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .post-meta {
            display: flex;
            gap: 0;
            font-size: 13px;
            color: #a1a1aa;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .meta-item:not(:last-child)::after {
            content: '·';
            margin: 0 10px;
            color: #d4d4d8;
        }

        .meta-label { color: #71717a; }
        .meta-value { color: #3f3f46; font-weight: 500; }

        .post-body {
            padding: 32px;
            font-size: 15px;
            color: #27272a;
            line-height: 1.9;
            min-height: 200px;
            white-space: pre-wrap;
        }

        /* 하단 버튼 */
        .post-footer {
            padding: 16px 32px;
            border-top: 1px solid #f4f4f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }

        .btn {
            padding: 9px 20px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }

        .btn-back {
            background: #fff;
            color: #52525b;
            border: 1.5px solid #e4e4e7;
        }

        .btn-back:hover {
            border-color: #a1a1aa;
            color: #18181b;
        }

        .btn-edit {
            background: #18181b;
            color: #fff;
        }

        .btn-edit:hover { background: #27272a; }

        .btn-delete {
            background: #fff;
            color: #be123c;
            border: 1.5px solid #fecdd3;
        }

        .btn-delete:hover {
            background: #fff1f2;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        /* 댓글 */
        .comment-section {
            margin-top: 24px;
        }

        .comment-form {
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .comment-form textarea {
            width: 100%;
            min-height: 80px;
            border: 1px solid #e4e4e7;
            border-radius: 7px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }

        .comment-form textarea:focus { border-color: #a1a1aa; }

        .comment-form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .comment-error {
            font-size: 13px;
            color: #be123c;
        }

        .btn-comment {
            background: #18181b;
            color: #fff;
            padding: 8px 18px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            cursor: pointer;
        }

        .btn-comment:hover { background: #27272a; }
    </style>
</head>
<body>

<header>
    <a th:href="@{/boards}" class="logo">Du<span>o</span></a>
    <nav class="header-nav">
        <div sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
        </div>
        <div class="nav-divider"></div>
        <div sec:authorize="isAuthenticated()">
            <a th:href="@{/logout}">로그아웃</a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">로그인</a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <div class="nav-divider"></div>
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="post-card">

        <div class="post-header">
            <div class="post-badge" th:text="${board.type}"></div>
            <div class="post-title" th:text="${board.title}"></div>
            <div class="post-meta">
                <div class="meta-item">
                    <span class="meta-label">작성자</span>
                    <span class="meta-value" th:text="${board.author}"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">작성일</span>
                    <span class="meta-value" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">조회</span>
                    <span class="meta-value" th:text="${board.viewCount}"></span>
                </div>
            </div>
        </div>

        <div class="post-body" th:text="${board.content}"></div>

        <div class="post-footer">
            <a th:href="@{/boards}" class="btn btn-back">← 목록으로</a>
            <div class="action-btns"
                 th:if="${board.username == #authentication?.name or #authentication?.authorities.![authority].contains('ROLE_ADMIN')}">
                <a th:href="@{/boards/{id}/edit(id=${board.boardId})}" class="btn btn-edit">수정</a>
                <form th:action="@{/boards/{id}/delete(id=${board.boardId})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-delete"
                            onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                </form>
            </div>
        </div>

    </div>
    <div class="comment-section" sec:authorize="isAuthenticated()">
        <form class="comment-form" th:action="@{/boards/{id}/comments/write(id=${board.boardId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <textarea name="content" placeholder="댓글을 입력하세요."></textarea>
            <div class="comment-form-footer">
                <span class="comment-error" th:if="${commentError}" th:text="${commentError}"></span>
                <span th:unless="${commentError}"></span>
                <button type="submit" class="btn-comment">댓글 등록</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
