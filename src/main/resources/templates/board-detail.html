<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title} + ' - Duo'">게시글 상세 - Duo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        header h1 a {
            color: white;
            text-decoration: none;
        }

        header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        header a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .post-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .post-header {
            padding: 28px 32px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .post-badge {
            display: inline-block;
            padding: 3px 10px;
            background: #ede9ff;
            color: #764ba2;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .post-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .post-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #888;
        }

        .post-meta span strong {
            color: #555;
        }

        .post-body {
            padding: 32px;
            font-size: 15px;
            color: #333;
            line-height: 1.8;
            min-height: 200px;
            white-space: pre-wrap;
        }

        .post-footer {
            padding: 16px 32px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 9px 20px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn-back {
            background: #f0f0f0;
            color: #555;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        .btn-edit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-edit:hover {
            opacity: 0.9;
        }

        .btn-delete {
            background: #ff4d4f;
            color: white;
            margin-left: 8px;
        }

        .btn-delete:hover {
            background: #e03e40;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>

<header>
    <h1><a th:href="@{/boards}">Duo 게시판</a></h1>
    <div class="user-info">
        <div sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
            <a th:href="@{/logout}">로그아웃</a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">로그인</a>
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="post-card">

        <div class="post-header">
            <div class="post-badge" th:text="${board.type}"></div>
            <div class="post-title" th:text="${board.title}"></div>
            <div class="post-meta">
                <span><strong>작성자</strong> &nbsp;<span th:text="${board.author}"></span></span>
                <span><strong>작성일</strong> &nbsp;<span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                <span><strong>조회수</strong> &nbsp;<span th:text="${board.viewCount}"></span></span>
            </div>
        </div>

        <div class="post-body" th:text="${board.content}"></div>

        <div class="post-footer">
            <a th:href="@{/boards}" class="btn btn-back">목록으로</a>
            <div class="action-buttons" sec:authorize="isAuthenticated()">
                <a th:href="@{/boards/{id}/edit(id=${board.boardId})}" class="btn btn-edit">수정</a>
                <form th:action="@{/boards/{id}/delete(id=${board.boardId})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-delete"
                            onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
