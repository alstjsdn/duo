<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title} + ' - Duo'">게시글 - Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1f2937;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 58px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: #818cf8; }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .header-nav span { color: #9ca3af; }

        .header-nav a {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .header-nav a:hover { color: #1f2937; }

        .nav-divider { width: 1px; height: 14px; background: #e5e7eb; }

        .container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 20px;
        }

        /* 게시글 카드 */
        .post-card {
            background: #ffffff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(129,140,248,0.06);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .post-header {
            padding: 28px 32px 22px;
            border-bottom: 1px solid #f0eeff;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .badge-RANK     { background: #fef3e2; color: #d97706; }
        .badge-CLASSIC  { background: #f5f0ff; color: #8b5cf6; }

        /* 게임 정보 */
        .game-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #f0eeff;
        }

        .game-info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .game-info-label {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .game-info-value {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
        }

        .line-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .line-tag {
            display: inline-block;
            padding: 3px 10px;
            background: #eff0ff;
            color: #6366f1;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        /* 파티원 현황 */
        .party-section {
            background: #fff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .party-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #6366f1;
            padding: 14px 20px 12px;
            border-bottom: 1px solid #f0eeff;
            background: #fafaff;
        }

        .party-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 14px;
            border-bottom: 1px solid #f3f4f6;
        }

        .party-row:last-child { border-bottom: none; }

        .party-line-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            padding: 3px 0;
            background: #eff0ff;
            color: #6366f1;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .party-user-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .party-user-name {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            text-decoration: none;
            transition: color 0.15s;
        }

        .party-user-name:hover { color: #818cf8; }

        .party-riot-id {
            font-size: 12px;
            color: #9ca3af;
        }

        .party-empty {
            flex: 1;
            font-size: 13px;
            color: #9ca3af;
        }

        .party-status-approved {
            font-size: 12px;
            font-weight: 600;
            color: #16a34a;
            background: #f0fdf4;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .party-status-pending {
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            background: #f3f4f6;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .btn-join {
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            padding: 5px 14px;
            border-radius: 8px;
            border: 1.5px solid #818cf8;
            background: #fff;
            color: #818cf8;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-join:hover { background: #818cf8; color: #fff; }

        /* 요청 목록 (작성자용) */
        .pending-section {
            background: #fff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .pending-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #d97706;
            padding: 14px 20px 12px;
            border-bottom: 1px solid #f0eeff;
            background: #fafaff;
        }

        .pending-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid #f3f4f6;
        }

        .pending-row:last-child { border-bottom: none; }

        .pending-user-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pending-user-name {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            text-decoration: none;
            transition: color 0.15s;
        }

        .pending-user-name:hover { color: #818cf8; }

        .pending-riot-id {
            font-size: 12px;
            color: #9ca3af;
        }

        .btn-approve {
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            padding: 5px 12px;
            border-radius: 7px;
            border: none;
            background: #818cf8;
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-approve:hover { background: #7070f0; }

        .btn-reject-req {
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            padding: 5px 12px;
            border-radius: 7px;
            border: 1.5px solid #fecaca;
            background: #fff;
            color: #dc2626;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-reject-req:hover { background: #fef2f2; }

        .post-title {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .post-meta {
            display: flex;
            gap: 0;
            font-size: 13px;
            color: #9ca3af;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .meta-item:not(:last-child)::after {
            content: '·';
            margin: 0 10px;
            color: #d1d5db;
        }

        .meta-label { color: #9ca3af; }
        .meta-value { color: #4b5563; font-weight: 500; }

        .post-body {
            padding: 32px;
            font-size: 15px;
            color: #4b5563;
            line-height: 1.9;
            min-height: 200px;
        }

        .post-body p { margin-bottom: 0.8em; }
        .post-body ul, .post-body ol { margin: 0.5em 0 0.5em 1.5em; }
        .post-body blockquote { border-left: 3px solid #e8e5f3; padding-left: 14px; color: #6b7280; margin: 0.5em 0; }
        .post-body table { border-collapse: collapse; margin: 0.5em 0; }
        .post-body table td, .post-body table th { border: 1px solid #e5e7eb; padding: 6px 12px; }
        .post-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 0.5em 0; }
        .post-body figure.image { margin: 0.8em 0; text-align: center; }
        .post-body figure.image figcaption { font-size: 13px; color: #9ca3af; margin-top: 4px; }

        .post-footer {
            padding: 14px 32px;
            border-top: 1px solid #f0eeff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafaff;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }

        .btn-back {
            background: #ffffff;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
        }

        .btn-back:hover { border-color: #818cf8; color: #1f2937; }

        .btn-edit {
            background: #818cf8;
            color: #ffffff;
        }

        .btn-edit:hover { background: #7070f0; }

        .btn-delete {
            background: #ffffff;
            color: #dc2626;
            border: 1.5px solid #fecaca;
        }

        .btn-delete:hover { background: #fef2f2; }

        .action-btns { display: flex; gap: 8px; align-items: center; }

        .edit-blocked-msg {
            font-size: 12px;
            color: #9ca3af;
            background: #f3f4f6;
            padding: 5px 12px;
            border-radius: 8px;
        }

        /* 작성자 프로필 */
        .author-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fafaff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            padding: 18px 22px;
            margin-bottom: 16px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, background 0.15s;
        }

        .author-card:hover {
            border-color: rgba(129,140,248,0.3);
            background: rgba(129,140,248,0.04);
        }

        .author-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-info { flex: 1; }

        .author-name {
            font-size: 14px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 3px;
        }

        .author-bio {
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.5;
        }

        /* 댓글 섹션 */
        .comment-section { margin-top: 0; }

        .comment-count {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .comment-item {
            background: #fafaff;
            border: 1px solid #e8e5f3;
            border-radius: 10px;
            padding: 16px 20px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .comment-author {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
        }

        .comment-date {
            font-size: 12px;
            color: #9ca3af;
        }

        .comment-content {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .comment-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .btn-comment-action {
            background: #ffffff;
            border: 1.5px solid #e5e7eb;
            color: #6b7280;
            padding: 4px 11px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-comment-action:hover { border-color: #818cf8; color: #1f2937; }

        .btn-comment-delete {
            background: #ffffff;
            border: 1.5px solid #fecaca;
            color: #dc2626;
            padding: 4px 11px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-comment-delete:hover { background: #fef2f2; }

        .comment-edit-form {
            display: none;
            margin-top: 10px;
        }

        .comment-edit-form textarea,
        .reply-form-wrap textarea,
        .comment-form textarea {
            width: 100%;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            outline: none;
            background: #fafaff;
            color: #1f2937;
            transition: all 0.15s;
        }

        .comment-edit-form textarea { min-height: 70px; }
        .reply-form-wrap textarea { min-height: 60px; font-size: 13px; }
        .comment-form textarea { min-height: 80px; }

        .comment-edit-form textarea:focus,
        .reply-form-wrap textarea:focus,
        .comment-form textarea:focus {
            border-color: #818cf8;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
        }

        .comment-edit-footer,
        .reply-form-footer,
        .comment-form-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .comment-form-footer { justify-content: space-between; }

        .btn-cancel {
            background: #ffffff;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-cancel:hover { border-color: #818cf8; }

        .btn-save {
            background: #818cf8;
            color: #ffffff;
            border: none;
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-save:hover { background: #7070f0; }

        /* 대댓글 (재귀) */
        .reply-list {
            margin-top: 10px;
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-left: 12px;
            border-left: 2px solid #e8e5f3;
        }

        .reply-item {
            background: #ffffff;
            border: 1px solid #e8e5f3;
            border-radius: 8px;
            padding: 12px 16px;
        }

        .reply-form-wrap {
            display: none;
            margin-top: 8px;
            margin-left: 20px;
            padding-left: 12px;
            border-left: 2px solid #e8e5f3;
        }

        /* 깊은 대댓글은 들여쓰기를 점점 줄여서 너무 좁아지지 않게 */
        .reply-list .reply-list {
            margin-left: 14px;
        }

        .btn-reply {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            padding: 4px 0;
            margin-top: 8px;
            transition: color 0.15s;
        }

        .btn-reply:hover { color: #818cf8; }

        /* 댓글 작성 폼 */
        .comment-form {
            background: #fafaff;
            border: 1px solid #e8e5f3;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 12px;
        }

        .btn-comment {
            background: #818cf8;
            color: #ffffff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(129,140,248,0.25);
            transition: background 0.15s;
        }

        .btn-comment:hover { background: #7070f0; }

        .comment-error {
            font-size: 13px;
            color: #dc2626;
        }

        /* 댓글 페이지네이션 */
        .comment-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin: 12px 0;
        }

        .comment-pagination a,
        .comment-pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            border: 1.5px solid #e5e7eb;
            color: #6b7280;
            text-decoration: none;
            background: #ffffff;
            transition: all 0.15s;
        }

        .comment-pagination a:hover { border-color: #818cf8; color: #818cf8; }
        .comment-pagination .active { background: #818cf8; color: #ffffff; border-color: #818cf8; }
        .comment-pagination .disabled { color: #d1d5db; pointer-events: none; background: #fafaff; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container">

    <div class="post-card">
        <div class="post-header">
            <div class="badge"
                 th:classappend="'badge-' + ${board.type}"
                 th:text="${board.type.name}"></div>
            <div class="post-title" th:text="${board.title}"></div>
            <div class="post-meta">
                <div class="meta-item">
                    <span class="meta-label">작성자</span>
                    <a class="meta-value" th:href="@{/profile/{username}(username=${board.username})}" th:text="${board.author}"></a>
                </div>
                <div class="meta-item">
                    <span class="meta-label">작성일</span>
                    <span class="meta-value" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">조회</span>
                    <span class="meta-value" th:text="${board.viewCount}"></span>
                </div>
            </div>

            <!-- 게임 정보 -->
            <div class="game-info"
                 th:if="${board.myLine != null or board.memberCount != null or (board.neededLines != null and !board.neededLines.empty)}">
                <div class="game-info-item" th:if="${board.myLine != null}">
                    <span class="game-info-label">내 라인</span>
                    <span class="game-info-value" th:text="${board.myLine.name}"></span>
                </div>
                <div class="game-info-item" th:if="${board.memberCount != null}">
                    <span class="game-info-label">인원수</span>
                    <span class="game-info-value" th:text="${board.memberCount} + '명'"></span>
                </div>
                <div class="game-info-item" th:if="${board.neededLines != null and !board.neededLines.empty}">
                    <span class="game-info-label">필요한 라인</span>
                    <div class="line-tags">
                        <span class="line-tag" th:each="line : ${board.neededLines}" th:text="${line.name}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="post-body" th:utext="${board.content}"></div>

        <div class="post-footer">
            <a th:href="@{/boards}" class="btn btn-back">← 목록으로</a>
            <div class="action-btns"
                 th:if="${board.username == #authentication?.name or #authentication?.authorities.![authority].contains('ROLE_ADMIN')}">
                <span th:if="${hasApproved}" class="edit-blocked-msg">승인된 파티원이 있어 수정할 수 없습니다</span>
                <a th:unless="${hasApproved}"
                   th:href="@{/boards/{id}/edit(id=${board.boardId})}" class="btn btn-edit">수정</a>
                <form th:action="@{/boards/{id}/delete(id=${board.boardId})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-delete"
                            onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 파티원 현황 -->
    <div class="party-section"
         th:if="${board.neededLines != null and !board.neededLines.empty}">
        <div class="party-section-title">
            파티원 현황
            <span th:text="${board.status.name}"
                  th:style="${board.status.name() == 'COMPLETED'} ? 'color:#16a34a;background:#f0fdf4;padding:2px 10px;border-radius:10px;font-size:11px;margin-left:6px;' : 'color:#6366f1;background:#eff0ff;padding:2px 10px;border-radius:10px;font-size:11px;margin-left:6px;'"></span>
        </div>
        <div th:each="line : ${board.neededLines}">
            <div class="party-row">
                <span class="party-line-badge" th:text="${line.name}"></span>

                <!-- 승인된 유저 있음 -->
                <th:block th:with="approved=${approvedByLine.get(line)}"
                          th:if="${approvedByLine.containsKey(line)}">
                    <div class="party-user-info">
                        <a class="party-user-name"
                           th:href="@{/profile/{username}(username=${approved.username})}"
                           th:text="${approved.name}"
                           onclick="window.open(this.href,'_blank','noopener,width=1100,height=800'); return false;"></a>
                        <span class="party-riot-id" th:text="${approved.riotId + '#' + approved.riotTag}"></span>
                    </div>
                    <span class="party-status-approved">승인됨</span>
                </th:block>

                <!-- 빈 슬롯 -->
                <th:block th:unless="${approvedByLine.containsKey(line)}">
                    <span class="party-empty">모집중</span>

                    <!-- 본인이 이미 요청중 -->
                    <span class="party-status-pending"
                          sec:authorize="isAuthenticated()"
                          th:if="${myPendingLines != null and myPendingLines.contains(line)}">요청중</span>

                    <!-- 참가 요청 버튼 (비작성자, 미요청) -->
                    <form th:action="@{/boards/{id}/join(id=${board.boardId})}" method="post"
                          sec:authorize="isAuthenticated()"
                          th:if="${board.username != #authentication?.name
                                  and (myPendingLines == null or !myPendingLines.contains(line))}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="gameLine" th:value="${line.name()}"/>
                        <button type="submit" class="btn-join">참가 요청</button>
                    </form>
                </th:block>
            </div>
        </div>
    </div>

    <!-- 참가 요청 목록 (작성자만) -->
    <div class="pending-section"
         th:if="${board.username == #authentication?.name and !pendingRequests.empty}">
        <div class="pending-section-title">
            참가 요청 목록
            <span th:text="'(' + ${pendingRequests.size()} + ')'"></span>
        </div>
        <div class="pending-row" th:each="req : ${pendingRequests}">
            <span class="party-line-badge" th:text="${req.gameLine.name}"></span>
            <div class="pending-user-info">
                <a class="pending-user-name"
                   th:href="@{/profile/{username}(username=${req.username})}"
                   th:text="${req.name}"
                   onclick="window.open(this.href,'_blank','noopener,width=1100,height=800'); return false;"></a>
                <span class="pending-riot-id" th:text="${req.riotId + '#' + req.riotTag}"></span>
            </div>
            <form th:action="@{/boards/{boardId}/join/{reqId}/approve(boardId=${board.boardId}, reqId=${req.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-approve">승인</button>
            </form>
            <form th:action="@{/boards/{boardId}/join/{reqId}/reject(boardId=${board.boardId}, reqId=${req.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-reject-req">거절</button>
            </form>
        </div>
    </div>

    <!-- 작성자 프로필 -->
    <a class="author-card" th:href="@{/profile/{username}(username=${board.username})}">
        <div class="author-avatar" th:if="${board.profileImage != null}">
            <img th:src="${board.profileImage}" alt="프로필">
        </div>
        <div class="author-avatar" th:unless="${board.profileImage != null}"
             th:text="${#strings.substring(board.author, 0, 1)}"></div>
        <div class="author-info">
            <div class="author-name" th:text="${board.author}"></div>
            <div class="author-bio" th:if="${board.bio != null}" th:text="${board.bio}"></div>
            <div class="author-bio" th:unless="${board.bio != null}">소개가 없습니다.</div>
        </div>
    </a>

    <!-- 댓글 섹션 -->
    <div class="comment-section">

        <!-- 댓글 작성 폼 -->
        <div sec:authorize="isAuthenticated()">
            <form class="comment-form" th:action="@{/boards/{id}/comments/write(id=${board.boardId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <textarea name="content" placeholder="댓글을 입력하세요."></textarea>
                <div class="comment-form-footer">
                    <span class="comment-error" th:if="${commentError}" th:text="${commentError}"></span>
                    <span th:unless="${commentError}"></span>
                    <button type="submit" class="btn-comment">댓글 등록</button>
                </div>
            </form>
        </div>

        <!-- 댓글 목록 (JS 렌더링) -->
        <div th:if="${comments.totalElements > 0}">
            <div class="comment-count" th:text="'댓글 ' + ${comments.totalElements} + '개'"></div>
            <div class="comment-list" id="comment-list"></div>

            <!-- 댓글 페이지네이션 -->
            <div class="comment-pagination" th:if="${comments.totalPages > 1}">
                <a th:classappend="${comments.first} ? 'disabled'"
                   th:href="@{/boards/{id}(id=${board.boardId}, commentPage=${comments.number - 1})}">&lsaquo;</a>
                <th:block th:each="i : ${#numbers.sequence(0, comments.totalPages - 1)}">
                    <span th:if="${i == comments.number}" class="active" th:text="${i + 1}"></span>
                    <a th:unless="${i == comments.number}"
                       th:href="@{/boards/{id}(id=${board.boardId}, commentPage=${i})}"
                       th:text="${i + 1}"></a>
                </th:block>
                <a th:classappend="${comments.last} ? 'disabled'"
                   th:href="@{/boards/{id}(id=${board.boardId}, commentPage=${comments.number + 1})}">&rsaquo;</a>
            </div>
        </div>

    </div>

    <!-- 댓글 데이터 -->
    <script th:inline="javascript">
        var COMMENT_DATA = {
            boardId: [[${board.boardId}]],
            csrfParam: [[${_csrf.parameterName}]],
            csrfToken: [[${_csrf.token}]],
            currentUser: [[${#authentication?.name}]],
            isAdmin: [[${#authentication != null && #authentication.authorities.![authority].contains('ROLE_ADMIN')}]],
            isAuthenticated: [[${#authentication != null && #authentication.name != 'anonymousUser'}]],
            comments: [[${comments.content}]]
        };
    </script>

</div>

<script>
    function escapeHtml(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
            + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function canEdit(comment) {
        return COMMENT_DATA.currentUser === comment.username || COMMENT_DATA.isAdmin;
    }

    function renderComment(comment, isRoot) {
        var D = COMMENT_DATA;
        var id = comment.commentId;
        var cls = isRoot ? 'comment-item' : 'reply-item';

        var html = '<div class="' + cls + '" id="comment-' + id + '">';

        // header
        html += '<div class="comment-header">'
            + '<span class="comment-author">' + escapeHtml(comment.author) + '</span>'
            + '<span class="comment-date">' + formatDate(comment.createdAt) + '</span>'
            + '</div>';

        // content
        html += '<div class="comment-content" id="content-' + id + '">' + escapeHtml(comment.content) + '</div>';

        // edit/delete buttons
        if (canEdit(comment)) {
            html += '<div class="comment-actions" id="actions-' + id + '">'
                + '<button type="button" class="btn-comment-action" onclick="toggleEdit(' + id + ')">수정</button>'
                + '<form action="/boards/' + D.boardId + '/comments/' + id + '/delete" method="post" style="display:inline;">'
                + '<input type="hidden" name="' + D.csrfParam + '" value="' + D.csrfToken + '"/>'
                + '<button type="submit" class="btn-comment-delete" onclick="return confirm(\'댓글을 삭제하시겠습니까?\')">삭제</button>'
                + '</form></div>';

            // edit form
            html += '<div class="comment-edit-form" id="edit-form-' + id + '">'
                + '<form action="/boards/' + D.boardId + '/comments/' + id + '/edit" method="post">'
                + '<input type="hidden" name="' + D.csrfParam + '" value="' + D.csrfToken + '"/>'
                + '<textarea name="content">' + escapeHtml(comment.content) + '</textarea>'
                + '<div class="comment-edit-footer">'
                + '<button type="button" class="btn-cancel" onclick="cancelEdit(' + id + ')">취소</button>'
                + '<button type="submit" class="btn-save">저장</button>'
                + '</div></form></div>';
        }

        // children (recursive)
        if (comment.children && comment.children.length > 0) {
            html += '<div class="reply-list">';
            for (var i = 0; i < comment.children.length; i++) {
                html += renderComment(comment.children[i], false);
            }
            html += '</div>';
        }

        // reply button
        if (D.isAuthenticated) {
            html += '<button type="button" class="btn-reply" onclick="toggleReply(' + id + ')">↩ 답글</button>'
                + '<div class="reply-form-wrap" id="reply-form-' + id + '">'
                + '<form action="/boards/' + D.boardId + '/comments/write" method="post">'
                + '<input type="hidden" name="' + D.csrfParam + '" value="' + D.csrfToken + '"/>'
                + '<input type="hidden" name="parentId" value="' + id + '"/>'
                + '<textarea name="content" placeholder="답글을 입력하세요."></textarea>'
                + '<div class="reply-form-footer">'
                + '<button type="button" class="btn-cancel" onclick="toggleReply(' + id + ')">취소</button>'
                + '<button type="submit" class="btn-save">등록</button>'
                + '</div></form></div>';
        }

        html += '</div>';
        return html;
    }

    // render all comments
    (function() {
        var list = document.getElementById('comment-list');
        if (!list) return;
        var html = '';
        var comments = COMMENT_DATA.comments;
        for (var i = 0; i < comments.length; i++) {
            html += renderComment(comments[i], true);
        }
        list.innerHTML = html;
    })();

    function toggleEdit(commentId) {
        document.getElementById('edit-form-' + commentId).style.display = 'block';
        document.getElementById('content-' + commentId).style.display = 'none';
        document.getElementById('actions-' + commentId).style.display = 'none';
    }

    function cancelEdit(commentId) {
        document.getElementById('edit-form-' + commentId).style.display = 'none';
        document.getElementById('content-' + commentId).style.display = '';
        document.getElementById('actions-' + commentId).style.display = '';
    }

    function toggleReply(commentId) {
        var form = document.getElementById('reply-form-' + commentId);
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
