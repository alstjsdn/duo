<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - Duo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        header a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .search-box {
            background: white;
            padding: 20px 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box select,
        .search-box input[type="text"] {
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            flex: 1;
            min-width: 120px;
        }

        .search-box select:focus,
        .search-box input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 9px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .search-box button:hover {
            opacity: 0.9;
        }

        .board-table {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f9f8ff;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #ede9ff;
            color: #764ba2;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
        }

        .pagination a, .pagination span {
            display: inline-block;
            padding: 7px 13px;
            border-radius: 5px;
            font-size: 14px;
            text-decoration: none;
            border: 1px solid #ddd;
            color: #555;
            background: white;
        }

        .pagination a:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .pagination .active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .pagination .disabled {
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Duo 게시판</h1>
    <div class="user-info">
        <!-- 로그인 상태 -->
        <div sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
            <a th:href="@{/logout}">로그아웃</a>
        </div>
        <!-- 비로그인 상태 -->
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">로그인</a>
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </div>
</header>

<div class="container">

    <!-- 검색 폼 -->
    <form th:action="@{/boards}" method="get" class="search-box">
        <select name="type">
            <option value="" th:selected="${search.type == null}">전체 유형</option>
            <option th:each="t : ${boardTypes}"
                    th:value="${t.name()}"
                    th:text="${t.name}"
                    th:selected="${t == search.type}"></option>
        </select>
        <input type="text" name="title" placeholder="제목 검색" th:value="${search.title}">
        <input type="text" name="content" placeholder="내용 검색" th:value="${search.content}">
        <button type="submit">검색</button>
    </form>

    <!-- 글쓰기 버튼 -->
    <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
        <a th:href="@{/boards/write}"
           style="padding: 9px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                  color: white; text-decoration: none; border-radius: 5px; font-size: 14px; font-weight: 600;">
            글쓰기
        </a>
    </div>

    <!-- 게시글 목록 -->
    <div class="board-table">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px">번호</th>
                    <th style="width: 80px">유형</th>
                    <th>제목</th>
                    <th style="width: 120px">작성자</th>
                    <th style="width: 80px">조회수</th>
                    <th style="width: 150px">작성일</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${boards.isEmpty()}">
                    <td colspan="6" class="empty">게시글이 없습니다.</td>
                </tr>
                <tr th:each="board : ${boards}">
                    <td th:text="${board.boardId}"></td>
                    <td><span class="badge" th:text="${board.type}"></span></td>
                    <td>
                        <a th:href="@{/boards/{id}(id=${board.boardId})}"
                           style="color: #333; text-decoration: none; font-weight: 500;"
                           th:text="${board.title}"></a>
                    </td>
                    <td th:text="${board.author}"></td>
                    <td th:text="${board.viewCount}"></td>
                    <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <div class="pagination" th:if="${boards.totalPages > 0}">
        <a th:classappend="${boards.first} ? 'disabled'"
           th:href="@{/boards(page=${boards.number - 1}, type=${search.type}, title=${search.title}, content=${search.content})}">&laquo;</a>

        <th:block th:each="i : ${#numbers.sequence(0, boards.totalPages - 1)}">
            <a th:if="${i != boards.number}"
               th:href="@{/boards(page=${i}, type=${search.type}, title=${search.title}, content=${search.content})}"
               th:text="${i + 1}"></a>
            <span th:if="${i == boards.number}" class="active" th:text="${i + 1}"></span>
        </th:block>

        <a th:classappend="${boards.last} ? 'disabled'"
           th:href="@{/boards(page=${boards.number + 1}, type=${search.type}, title=${search.title}, content=${search.content})}">&raquo;</a>
    </div>

</div>

</body>
</html>
