<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1f2937;
        }

        /* 헤더 */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 58px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: #818cf8; }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .header-nav span { color: #9ca3af; }

        .header-nav a {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .header-nav a:hover { color: #1f2937; background: rgba(129,140,248,0.06); }

        .nav-divider { width: 1px; height: 14px; background: #e5e7eb; }

        /* 컨텐츠 */
        .container {
            max-width: 1060px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }

        .btn-write {
            padding: 8px 18px;
            background: #818cf8;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.15s;
            box-shadow: 0 1px 3px rgba(129,140,248,0.3);
        }

        .btn-write:hover { background: #7070f0; }

        /* 검색 */
        .search-box {
            background: #fafaff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search-box select,
        .search-box input[type="text"] {
            padding: 8px 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: #1f2937;
            background: #ffffff;
            transition: border-color 0.15s, background 0.15s;
            flex: 1;
            min-width: 120px;
        }

        .search-box select:focus,
        .search-box input[type="text"]:focus {
            outline: none;
            border-color: #818cf8;
            background: #fff;
        }

        .search-box button {
            padding: 8px 20px;
            background: #818cf8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .search-box button:hover { background: #7070f0; }

        /* 테이블 */
        .board-wrap {
            background: #ffffff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr { border-bottom: 1.5px solid #e8e5f3; }

        th {
            padding: 11px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #fafaff;
        }

        td {
            padding: 13px 16px;
            font-size: 14px;
            color: #4b5563;
            border-bottom: 1px solid #f3f4f6;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr { transition: background 0.1s; }
        tbody tr:hover { background: #fafaff; }

        .title-link {
            color: #1f2937;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }

        .title-link:hover { color: #818cf8; }

        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-QUESTION { background: #eff0ff; color: #6366f1; }
        .badge-FREE     { background: #ecfdf5; color: #059669; }
        .badge-RANK     { background: #fef3e2; color: #d97706; }
        .badge-CLASSIC  { background: #f5f0ff; color: #8b5cf6; }

        .view-count { color: #9ca3af; font-size: 13px; }
        .date       { color: #9ca3af; font-size: 13px; }
        .author     { color: #6b7280; font-size: 13px; font-weight: 500; }

        .empty {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
            font-size: 14px;
        }

        /* 페이징 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-top: 24px;
        }

        .pagination a,
        .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            border: 1.5px solid #e5e7eb;
            color: #4b5563;
            background: #fff;
            transition: all 0.15s;
        }

        .pagination a:hover { border-color: #818cf8; color: #818cf8; }
        .pagination .active { background: #818cf8; color: #fff; border-color: #818cf8; }
        .pagination .disabled { color: #d1d5db; pointer-events: none; background: #fafaff; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container">

    <div class="page-header">
        <h1 class="page-title">게시판</h1>
        <a th:href="@{/boards/write}" class="btn-write" sec:authorize="isAuthenticated()">+ 글쓰기</a>
    </div>

    <form th:action="@{/boards}" method="get" class="search-box">
        <select name="type">
            <option value="" th:selected="${search.type == null}">전체 유형</option>
            <option th:each="t : ${boardTypes}"
                    th:value="${t.name()}"
                    th:text="${t.name}"
                    th:selected="${t == search.type}"></option>
        </select>
        <input type="text" name="title" placeholder="제목 검색" th:value="${search.title}">
        <input type="text" name="content" placeholder="내용 검색" th:value="${search.content}">
        <button type="submit">검색</button>
    </form>

    <div class="board-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:60px">번호</th>
                    <th style="width:90px">유형</th>
                    <th>제목</th>
                    <th style="width:110px">작성자</th>
                    <th style="width:60px">조회</th>
                    <th style="width:140px">작성일</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${boards.isEmpty()}">
                    <td colspan="6" class="empty">게시글이 없습니다.</td>
                </tr>
                <tr th:each="board : ${boards}">
                    <td style="color:#cbd5e1; font-size:12px;" th:text="${board.boardId}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${board.type}"
                              th:text="${board.type.name}"></span>
                    </td>
                    <td>
                        <a th:href="@{/boards/{id}(id=${board.boardId})}"
                           class="title-link"
                           th:text="${board.title}"></a>
                    </td>
                    <td class="author" th:text="${board.author}"></td>
                    <td class="view-count" th:text="${board.viewCount}"></td>
                    <td class="date" th:text="${#temporals.format(board.createdAt, 'yyyy.MM.dd HH:mm')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${boards.totalPages > 0}">
        <a th:classappend="${boards.first} ? 'disabled'"
           th:href="@{/boards(page=${boards.number - 1}, type=${search.type}, title=${search.title}, content=${search.content})}">&lsaquo;</a>
        <th:block th:each="i : ${#numbers.sequence(0, boards.totalPages - 1)}">
            <a th:if="${i != boards.number}"
               th:href="@{/boards(page=${i}, type=${search.type}, title=${search.title}, content=${search.content})}"
               th:text="${i + 1}"></a>
            <span th:if="${i == boards.number}" class="active" th:text="${i + 1}"></span>
        </th:block>
        <a th:classappend="${boards.last} ? 'disabled'"
           th:href="@{/boards(page=${boards.number + 1}, type=${search.type}, title=${search.title}, content=${search.content})}">&rsaquo;</a>
    </div>

</div>
</body>
</html>
