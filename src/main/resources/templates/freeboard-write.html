<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - 자유게시판</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(129,140,248,0.06);
            padding: 32px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 7px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .form-group select,
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-size: 14px;
            font-family: inherit;
            color: #1f2937;
            background: #fafaff;
            transition: all 0.15s;
        }

        .form-group select:focus,
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #818cf8;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
        }

        .ck.ck-editor__main>.ck-editor__editable {
            min-height: 300px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            color: #1f2937;
        }

        .ck.ck-editor__editable:focus {
            border-color: #818cf8 !important;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.12) !important;
        }

        .error-msg {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
        }

        .divider {
            border: none;
            border-top: 1px solid #f0eeff;
            margin: 24px 0 20px;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.15s;
        }

        .btn-primary {
            background: #818cf8;
            color: #fff;
            box-shadow: 0 2px 8px rgba(129,140,248,0.25);
        }

        .btn-primary:hover { background: #7070f0; }

        .btn-secondary {
            background: #fff;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
        }

        .btn-secondary:hover { border-color: #818cf8; color: #1f2937; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container">
    <div class="page-title">게시글 등록</div>

    <div class="card">
        <form th:action="@{/freeboards/write}" th:object="${boardRequest}" method="post">

            <div class="form-group">
                <label for="type">유형</label>
                <select id="type" th:field="*{type}">
                    <option value="">유형 선택</option>
                    <option th:each="t : ${boardTypes}"
                            th:value="${t.name()}"
                            th:text="${t.name}"></option>
                </select>
                <p class="error-msg" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
            </div>

            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력해주세요." autofocus>
                <p class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <div id="editor"></div>
                <textarea id="content" th:field="*{content}" style="display:none;"></textarea>
                <p class="error-msg" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>

            <hr class="divider">

            <div class="btn-group">
                <a th:href="@{/freeboards}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary">등록하기</button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
<script>
    function Base64UploadAdapterPlugin(editor) {
        editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
            return {
                upload() {
                    return loader.file.then(file => new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({ default: reader.result });
                        reader.onerror = () => reject('이미지를 읽을 수 없습니다.');
                        reader.readAsDataURL(file);
                    }));
                },
                abort() {}
            };
        };
    }

    ClassicEditor
        .create(document.querySelector('#editor'), {
            extraPlugins: [Base64UploadAdapterPlugin],
            toolbar: ['heading', '|', 'bold', 'italic', 'underline', 'strikethrough', '|',
                       'bulletedList', 'numberedList', 'blockQuote', '|',
                       'link', 'imageUpload', 'insertTable', '|', 'undo', 'redo'],
            placeholder: '내용을 입력해주세요.'
        })
        .then(editor => {
            document.querySelector('form').addEventListener('submit', () => {
                document.querySelector('#content').value = editor.getData();
            });
        })
        .catch(error => console.error(error));
</script>
</body>
</html>
