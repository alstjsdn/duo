<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅방 - Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1f2937;
            overflow: hidden;
        }

        .chat-card {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid #f0eeff;
            background: #fafaff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-title {
            font-size: 14px;
            font-weight: 700;
            color: #4b5563;
        }

        .chat-header-title span {
            color: #818cf8;
        }

        .online-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #6b7280;
        }

        .online-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

        .msg-row {
            display: flex;
            flex-direction: column;
        }

        .msg-row.mine {
            align-items: flex-end;
        }

        .msg-row.others {
            align-items: flex-start;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 3px;
            padding: 0 4px;
        }

        .msg-bubble-wrap {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .msg-row.mine .msg-bubble-wrap {
            flex-direction: row-reverse;
        }

        .msg-bubble {
            max-width: 380px;
            padding: 9px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
        }

        .msg-row.mine .msg-bubble {
            background: #818cf8;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .msg-row.others .msg-bubble {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: #d1d5db;
            white-space: nowrap;
            margin-bottom: 2px;
        }

        .system-msg {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            padding: 4px 0;
        }

        .chat-input-area {
            padding: 14px 20px;
            border-top: 1px solid #f0eeff;
            background: #ffffff;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            background: #fafaff;
            color: #1f2937;
            transition: border-color 0.15s, box-shadow 0.15s;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: #818cf8;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
        }

        .btn-send {
            background: #818cf8;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
            height: 42px;
        }

        .btn-send:hover { background: #7070f0; }
        .btn-send:disabled { background: #c7d2fe; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-card">
        <div class="chat-header">
            <span class="chat-header-title">파티 채팅방 <span th:text="'#' + ${boardId}"></span></span>
            <div class="online-badge">
                <span class="online-dot"></span>
                <span id="onlineStatus">연결 중...</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="system-msg">채팅 내역을 불러왔습니다.</div>

            <!-- 서버에서 받아온 이전 메시지 -->
            <th:block th:each="msg : ${messages}">
                <div th:classappend="${msg.senderUsername == currentUsername} ? 'mine' : 'others'"
                     class="msg-row"
                     th:attr="data-username=${msg.senderUsername}">
                    <div class="msg-sender"
                         th:unless="${msg.senderUsername == currentUsername}"
                         th:text="${msg.senderName}"></div>
                    <div class="msg-bubble-wrap">
                        <div class="msg-bubble" th:text="${msg.content}"></div>
                        <span class="msg-time"
                              th:text="${#temporals.format(msg.createdAt, 'HH:mm')}"></span>
                    </div>
                </div>
            </th:block>
        </div>

        <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput"
                      placeholder="메시지를 입력하세요... (Shift+Enter로 줄바꿈)"
                      rows="1"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">전송</button>
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:inline="javascript">
    var BOARD_ID = [[${boardId}]];
    var CURRENT_USERNAME = [[${currentUsername}]];
    var CURRENT_NAME = [[${currentName}]];

    var stompClient = null;
    var messagesEl = document.getElementById('chatMessages');
    var inputEl = document.getElementById('chatInput');
    var sendBtn = document.getElementById('sendBtn');
    var statusEl = document.getElementById('onlineStatus');

    function connect() {
        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // 콘솔 로그 숨김

        stompClient.connect({}, function () {
            statusEl.textContent = '연결됨';
            sendBtn.disabled = false;

            stompClient.subscribe('/topic/chat/' + BOARD_ID, function (frame) {
                var msg = JSON.parse(frame.body);
                appendMessage(msg, false);
                scrollToBottom();
            });

            scrollToBottom();
        }, function () {
            statusEl.textContent = '연결 끊김 - 재연결 중...';
            sendBtn.disabled = true;
            setTimeout(connect, 3000);
        });
    }

    function sendMessage() {
        var content = inputEl.value.trim();
        if (!content || !stompClient || !stompClient.connected) return;

        stompClient.send('/app/chat/' + BOARD_ID + '/send', {}, JSON.stringify({ content: content }));
        inputEl.value = '';
        inputEl.style.height = 'auto';
    }

    function appendMessage(msg, isHistory) {
        var isMine = msg.senderUsername === CURRENT_USERNAME;

        var row = document.createElement('div');
        row.className = 'msg-row ' + (isMine ? 'mine' : 'others');

        var timeStr = formatTime(msg.createdAt);

        if (!isMine) {
            var sender = document.createElement('div');
            sender.className = 'msg-sender';
            sender.textContent = msg.senderName;
            row.appendChild(sender);
        }

        var wrap = document.createElement('div');
        wrap.className = 'msg-bubble-wrap';

        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = msg.content;

        var time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = timeStr;

        wrap.appendChild(bubble);
        wrap.appendChild(time);
        row.appendChild(wrap);

        messagesEl.appendChild(row);
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        var h = d.getHours();
        var m = d.getMinutes();
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
    }

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Enter 전송, Shift+Enter 줄바꿈
    inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // textarea 자동 높이 조절
    inputEl.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    sendBtn.disabled = true;
    connect();
    scrollToBottom();
</script>
</body>
</html>
