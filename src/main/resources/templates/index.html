<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #18181b;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span { color: #f97316; }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .card {
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 12px;
            padding: 56px 64px;
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            background: #fff7ed;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #18181b;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #71717a;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .user-info {
            background: #f4f4f5;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 28px;
            text-align: left;
        }

        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
        }

        .user-info-row:not(:last-child) {
            border-bottom: 1px solid #e4e4e7;
        }

        .user-info-label { color: #71717a; }
        .user-info-value { color: #18181b; font-weight: 600; }

        .role-badge {
            background: #fff7ed;
            color: #c2410c;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-group { display: flex; gap: 10px; justify-content: center; }

        .btn {
            display: inline-block;
            padding: 11px 28px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn:hover { opacity: 0.85; }

        .btn-primary {
            background: #18181b;
            color: #fff;
        }

        .btn-outline {
            background: #fff;
            color: #18181b;
            border: 1.5px solid #d4d4d8;
        }

        .btn-ghost {
            background: transparent;
            color: #71717a;
            border: 1.5px solid #e4e4e7;
        }

        .board-link {
            margin-top: 20px;
        }

        .board-link a {
            color: #f97316;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .board-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Du<span>o</span></div>
    </header>

    <div class="main">
        <div class="card">
            <div class="card-icon">👋</div>
            <h1>Duo에 오신 것을 환영합니다</h1>
            <p class="subtitle">함께 만들어가는 커뮤니티</p>

            <!-- 로그인한 사용자 -->
            <div sec:authorize="isAuthenticated()">
                <div class="user-info">
                    <div class="user-info-row">
                        <span class="user-info-label">이름</span>
                        <span class="user-info-value" sec:authentication="principal.user.name"></span>
                    </div>
                    <div class="user-info-row">
                        <span class="user-info-label">아이디</span>
                        <span class="user-info-value" sec:authentication="principal.user.username"></span>
                    </div>
                    <div class="user-info-row">
                        <span class="user-info-label">권한</span>
                        <span class="role-badge" sec:authentication="principal.user.role"></span>
                    </div>
                </div>
                <div class="btn-group">
                    <a th:href="@{/boards}" class="btn btn-primary">게시판 바로가기</a>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-ghost">로그아웃</button>
                    </form>
                </div>
            </div>

            <!-- 비로그인 사용자 -->
            <div sec:authorize="!isAuthenticated()">
                <div class="btn-group">
                    <a th:href="@{/login}" class="btn btn-primary">로그인</a>
                    <a th:href="@{/signup}" class="btn btn-outline">회원가입</a>
                </div>
                <div class="board-link">
                    <a th:href="@{/boards}">게시판 둘러보기 →</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
