<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Duo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .error-message {
            color: #c33;
            font-size: 12px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .alert-error {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Duo 회원가입</h1>

        <!-- 에러 메시지 -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- 회원가입 폼 -->
        <form th:action="@{/signup}" method="post" th:object="${userRequest}">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" th:field="*{name}" required autofocus
                       placeholder="이름을 입력하세요">
                <div class="error-message" th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" th:field="*{username}" required
                       placeholder="아이디를 입력하세요 (소문자+숫자 8-11자)"
                       pattern="[a-z0-9]{8,11}"
                       title="소문자 영어와 숫자만 가능하며, 8자 이상 11자 이하여야 합니다.">
                <div class="error-message" th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" th:field="*{password}" required
                       placeholder="비밀번호를 입력하세요">
                <div class="error-message" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <button type="submit">가입하기</button>
        </form>

        <div class="login-link">
            이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </div>
    </div>
</body>
</html>
