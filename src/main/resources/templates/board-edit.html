<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정 - Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1f2937;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 58px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: #818cf8; }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .header-nav span { color: #9ca3af; }

        .header-nav a {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .header-nav a:hover { color: #1f2937; background: rgba(129,140,248,0.06); }

        .nav-divider { width: 1px; height: 14px; background: #e5e7eb; }

        .container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .page-header { margin-bottom: 20px; }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e8e5f3;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(129,140,248,0.06);
            padding: 32px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 7px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .form-group select,
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-size: 14px;
            font-family: inherit;
            color: #1f2937;
            background: #fafaff;
            transition: all 0.15s;
        }

        .form-group select:focus,
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #818cf8;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
        }

        .form-group textarea {
            height: 300px;
            resize: vertical;
            line-height: 1.7;
        }

        .ck.ck-editor__main>.ck-editor__editable {
            min-height: 300px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            color: #1f2937;
        }

        .ck.ck-editor__editable:focus {
            border-color: #818cf8 !important;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.12) !important;
        }

        .error-msg {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
        }

        .divider {
            border: none;
            border-top: 1px solid #f0eeff;
            margin: 24px 0 20px;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.15s;
        }

        .btn-primary {
            background: #818cf8;
            color: #fff;
            box-shadow: 0 2px 8px rgba(129,140,248,0.25);
        }

        .btn-primary:hover { background: #7070f0; }

        .btn-secondary {
            background: #fff;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
        }

        .btn-secondary:hover { border-color: #818cf8; color: #1f2937; }

        /* 게임 옵션 섹션 */
        .game-options {
            display: flex;
            background: #fafaff;
            border: 1.5px solid #e8e5f3;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            gap: 18px;
            flex-direction: column;
        }

        .game-options-title {
            font-size: 12px;
            font-weight: 700;
            color: #818cf8;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .game-options-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .game-options-row .form-group {
            flex: 1;
            min-width: 140px;
            margin-bottom: 0;
        }

        .line-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 2px;
        }

        .line-checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #4b5563;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .line-checkbox-label:hover { border-color: #818cf8; color: #818cf8; }

        .line-checkbox-label input[type="checkbox"] { display: none; }

        .line-checkbox-label.checked {
            background: #818cf8;
            border-color: #818cf8;
            color: #fff;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container">
    <div class="page-header">
        <div class="page-title">게시글 수정</div>
    </div>

    <div class="card">
        <form th:action="@{/boards/{id}/edit(id=${boardId})}" th:object="${boardRequest}" method="post">

            <div class="form-group">
                <label for="type">유형</label>
                <select id="type" th:field="*{type}">
                    <option value="">유형 선택</option>
                    <option th:each="t : ${boardTypes}"
                            th:value="${t.name()}"
                            th:text="${t.name}"></option>
                </select>
                <p class="error-msg" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
            </div>

            <!-- 게임 옵션 -->
            <div class="game-options">
                <div class="game-options-title">게임 설정</div>
                <div class="game-options-row">
                    <div class="form-group">
                        <label for="myLine">내 라인</label>
                        <select id="myLine" name="myLine" th:field="*{myLine}">
                            <option value="">라인 선택</option>
                            <option th:each="line : ${gameLines}"
                                    th:value="${line.name()}"
                                    th:text="${line.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="memberCount">원하는 인원수</label>
                        <select id="memberCount" name="memberCount" th:field="*{memberCount}" onchange="onMemberCountChange(this.value)">
                            <option value="">인원 선택</option>
                            <option value="2">2명</option>
                            <option value="3">3명</option>
                            <option value="4">4명</option>
                            <option value="5">5명</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>필요한 라인 <span id="neededLinesHint" style="font-weight:400;color:#9ca3af;text-transform:none;letter-spacing:0;"></span></label>
                    <div class="line-checkboxes" id="neededLinesGroup">
                        <label th:each="line : ${gameLines}" class="line-checkbox-label"
                               th:classappend="${boardRequest.neededLines != null and boardRequest.neededLines.contains(line)} ? ' checked' : ''">
                            <input type="checkbox" name="neededLines"
                                   th:value="${line.name()}"
                                   th:checked="${boardRequest.neededLines != null and boardRequest.neededLines.contains(line)}"
                                   onchange="toggleCheckStyle(this)">
                            <span th:text="${line.name}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력해주세요.">
                <p class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <div id="editor" th:utext="${boardRequest.content}"></div>
                <textarea id="content" th:field="*{content}" style="display:none;"></textarea>
                <p class="error-msg" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>

            <hr class="divider">

            <div class="btn-group">
                <a th:href="@{/boards/{id}(id=${boardId})}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary">수정하기</button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
<script>
    function Base64UploadAdapterPlugin(editor) {
        editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
            return {
                upload() {
                    return loader.file.then(file => new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({ default: reader.result });
                        reader.onerror = () => reject('이미지를 읽을 수 없습니다.');
                        reader.readAsDataURL(file);
                    }));
                },
                abort() {}
            };
        };
    }

    ClassicEditor
        .create(document.querySelector('#editor'), {
            extraPlugins: [Base64UploadAdapterPlugin],
            toolbar: ['heading', '|', 'bold', 'italic', 'underline', 'strikethrough', '|',
                       'bulletedList', 'numberedList', 'blockQuote', '|',
                       'link', 'imageUpload', 'insertTable', '|', 'undo', 'redo'],
            placeholder: '내용을 입력해주세요.'
        })
        .then(editor => {
            const form = document.querySelector('form');
            form.addEventListener('submit', () => {
                document.querySelector('#content').value = editor.getData();
            });
        })
        .catch(error => console.error(error));

    function getMaxNeeded() {
        var val = parseInt(document.getElementById('memberCount').value);
        return isNaN(val) ? 0 : val - 1;
    }

    function getCheckedCount() {
        return document.querySelectorAll('#neededLinesGroup input[type="checkbox"]:checked').length;
    }

    function updateNeededLinesState() {
        var max = getMaxNeeded();
        var checked = getCheckedCount();
        var hint = document.getElementById('neededLinesHint');

        if (max <= 0) {
            hint.textContent = '(인원수를 먼저 선택하세요)';
        } else {
            hint.textContent = '(' + checked + ' / ' + max + '개 선택)';
        }

        document.querySelectorAll('#neededLinesGroup input[type="checkbox"]').forEach(function(cb) {
            var label = cb.closest('.line-checkbox-label');
            if (!cb.checked && checked >= max) {
                cb.disabled = true;
                label.style.opacity = '0.4';
                label.style.cursor = 'not-allowed';
            } else {
                cb.disabled = false;
                label.style.opacity = '';
                label.style.cursor = '';
            }
        });
    }

    function onMemberCountChange(val) {
        var max = parseInt(val);
        if (isNaN(max)) max = 0;
        var limit = max - 1;
        var checked = 0;
        document.querySelectorAll('#neededLinesGroup input[type="checkbox"]').forEach(function(cb) {
            if (cb.checked) {
                checked++;
                if (checked > limit) {
                    cb.checked = false;
                    cb.closest('.line-checkbox-label').classList.remove('checked');
                }
            }
        });
        updateNeededLinesState();
    }

    function toggleCheckStyle(checkbox) {
        var label = checkbox.closest('.line-checkbox-label');
        if (checkbox.checked) {
            label.classList.add('checked');
        } else {
            label.classList.remove('checked');
        }
        updateNeededLinesState();
    }

    // 초기 상태 설정
    (function() {
        updateNeededLinesState();
    })();
</script>

</body>
</html>
